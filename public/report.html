
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Audit Report - AuditScope</title>
    <link rel="stylesheet" href="dashboard.css">
    <style>
        body {
            background: var(--cc-bg);
            color: var(--cc-text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .report-container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--cc-card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--cc-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            overflow: hidden;
        }
        .report-header {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(5, 7, 10, 0.4) 100%);
            color: var(--cc-text-main);
            padding: 60px 40px;
            border-bottom: 1px solid var(--cc-border);
        }
        .report-header h1 {
            margin: 20px 0 10px 0;
            font-size: 2.5rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
        }
        .report-meta {
            display: flex;
            gap: 40px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .meta-item {
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--cc-text-muted);
        }
        .meta-item strong {
            color: var(--cc-text-main);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .report-body {
            padding: 40px;
        }
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
            margin-bottom: 50px;
        }
        .summary-card {
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.3s ease;
        }
        .summary-card:hover { transform: translateY(-5px); }
        .summary-card.high { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); }
        .summary-card.medium { background: rgba(251, 191, 36, 0.1); border-color: rgba(251, 191, 36, 0.2); }
        .summary-card.low { background: rgba(59, 130, 246, 0.1); border-color: rgba(59, 130, 246, 0.2); }
        .summary-card.secure { background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.2); }
        
        .summary-card h3 {
            font-size: 3.5rem;
            margin: 0;
            font-weight: 800;
            font-family: 'Outfit', sans-serif;
        }
        .summary-card.high h3 { color: #ef4444; }
        .summary-card.medium h3 { color: #fbbf24; }
        .summary-card.low h3 { color: #3b82f6; }
        .summary-card.secure h3 { color: #10b981; }

        .summary-card p {
            margin: 10px 0 0 0;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            font-weight: 700;
            color: var(--cc-text-muted);
        }
        
        .service-section {
            margin-bottom: 50px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid var(--cc-border);
        }
        .service-header {
            padding-bottom: 20px;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--cc-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .service-header h2 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            margin: 0;
        }
        .vulnerability-table {
            width: 100%;
            border-collapse: collapse;
        }
        .vulnerability-table th {
            text-align: left;
            padding: 15px 20px;
            font-weight: 800;
            color: var(--cc-text-main);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--cc-border);
        }
        .vulnerability-table td {
            padding: 20px;
            border-bottom: 1px solid var(--cc-border);
            color: var(--cc-text-muted);
            font-size: 0.9rem;
        }
        .vulnerability-table tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }
        .severity-badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .severity-high { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .severity-medium { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
        .severity-low { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        
        .back-button {
            background: rgba(255, 255, 255, 0.1);
            color: var(--cc-text-main);
            border: 1px solid var(--cc-border);
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .back-button:hover {
            background: var(--cc-primary);
            color: #05070a;
            border-color: var(--cc-primary);
        }
        .loading {
            text-align: center;
            padding: 100px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }
        .loading h2 {
            color: var(--cc-text-main);
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <h2>Loading Report...</h2>
    </div>

    <div class="report-container" id="report" style="display: none;">
        <div class="report-header">
            <a href="dashboard.html" class="back-button">← Back to Dashboard</a>
            <h1 id="report-title">Security Audit Report</h1>
            <div class="report-meta">
                <div class="meta-item">
                    <ion-icon name="calendar-outline" style="font-size: 1.5rem;"></ion-icon>
                    <div>
                        <strong>Scan Date:</strong><br>
                        <span id="scan-date">-</span>
                    </div>
                </div>
                <div class="meta-item">
                    <ion-icon name="cloud-outline" style="font-size: 1.5rem;"></ion-icon>
                    <div>
                        <strong>Platform:</strong><br>
                        <span id="platform">-</span>
                    </div>
                </div>
                <div class="meta-item">
                    <ion-icon name="folder-outline" style="font-size: 1.5rem;"></ion-icon>
                    <div>
                        <strong>Project:</strong><br>
                        <span id="project-name">-</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="report-body">
            <div class="summary-cards">
                <div class="summary-card high">
                    <h3 id="high-count">0</h3>
                    <p>High Risk</p>
                </div>
                <div class="summary-card medium">
                    <h3 id="medium-count">0</h3>
                    <p>Medium Risk</p>
                </div>
                <div class="summary-card low">
                    <h3 id="low-count">0</h3>
                    <p>Low Risk</p>
                </div>
                <div class="summary-card secure">
                    <h3 id="secure-count">0</h3>
                    <p>Secure</p>
                </div>
            </div>

            <div id="services-container"></div>
        </div>
    </div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    
    <script>
        // Get scan ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const scanId = urlParams.get('scanId');
        const projectId = urlParams.get('projectId');

        if (!scanId && !projectId) {
            document.getElementById('loading').innerHTML = '<h2 style="color: white;">❌ No scan specified</h2><a href="dashboard.html" class="back-button">Back to Dashboard</a>';
        } else {
            loadReport();
        }

        async function loadReport() {
            try {
                let response;
                
                if (scanId) {
                    // Load specific scan by ID
                    response = await fetch(`/api/scan-results/${scanId}`);
                } else if (projectId) {
                    // Load latest scan for project
                    const user = JSON.parse(localStorage.getItem('gcp_audit_user'));
                    const userId = user.email || user.username || user.name;
                    response = await fetch(`/api/scan-results/latest?userId=${encodeURIComponent(userId)}&platform=GCP`);
                }

                const data = await response.json();

                if (!data.success || !data.scan) {
                    throw new Error('Scan not found');
                }

                const scan = data.scan;
                const results = scan.results;

                // Update header
                document.getElementById('report-title').textContent = `${scan.projectName || scan.projectId} - Security Report`;
                document.getElementById('scan-date').textContent = new Date(scan.timestamp).toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
                document.getElementById('platform').textContent = scan.platform;
                document.getElementById('project-name').textContent = scan.projectName || scan.projectId;

                // Calculate summary
                let high = 0, medium = 0, low = 0, secure = 0;
                const services = results.services || {};

                Object.values(services).forEach(service => {
                    high += service.summary?.high || 0;
                    medium += service.summary?.medium || 0;
                    low += service.summary?.low || 0;
                    secure += service.summary?.secure || 0;
                });

                document.getElementById('high-count').textContent = high;
                document.getElementById('medium-count').textContent = medium;
                document.getElementById('low-count').textContent = low;
                document.getElementById('secure-count').textContent = secure;

                // Render services
                const container = document.getElementById('services-container');
                container.innerHTML = '';

                Object.entries(services).forEach(([serviceName, serviceData]) => {
                    if (serviceData.vulnerabilities && serviceData.vulnerabilities.length > 0) {
                        const section = document.createElement('div');
                        section.className = 'service-section';

                        section.innerHTML = `
                            <div class="service-header">
                                <h2>${serviceName}</h2>
                                <div>
                                    <span class="severity-badge severity-high">${serviceData.summary.high} High</span>
                                    <span class="severity-badge severity-medium">${serviceData.summary.medium} Medium</span>
                                    <span class="severity-badge severity-low">${serviceData.summary.low} Low</span>
                                </div>
                            </div>
                            <table class="vulnerability-table">
                                <thead>
                                    <tr>
                                        <th>Asset</th>
                                        <th>Description</th>
                                        <th>Severity</th>
                                        <th>Remediation</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${serviceData.vulnerabilities.map(vuln => `
                                        <tr>
                                            <td><code>${vuln.asset}</code></td>
                                            <td>${vuln.description}</td>
                                            <td><span class="severity-badge severity-${vuln.severity.toLowerCase()}">${vuln.severity}</span></td>
                                            <td>${vuln.remediation}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        `;

                        container.appendChild(section);
                    }
                });

                // Show report
                document.getElementById('loading').style.display = 'none';
                document.getElementById('report').style.display = 'block';

            } catch (e) {
                document.getElementById('loading').innerHTML = `
                    <h2 style="color: white;">❌ Error Loading Report</h2>
                    <p style="color: white;">${e.message}</p>
                    <a href="dashboard.html" class="back-button">Back to Dashboard</a>
                `;
            }
        }
    </script>
</body>
</html>
